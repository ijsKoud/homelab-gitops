apiVersion: batch/v1
kind: CronJob
metadata:
  name: appiecal-sync-automatic-sync-cron-job
spec:
  schedule: "0 11,23 * * *" # 11 AM and 11 PM daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        spec:
          containers:
            - name: sync-job
              image: mtand/alpine-curl-jq:latest
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail

                  API_URL="http://appiecal-sync/v1/sync/automatic/trigger"

                  echo "Requesting M2M token..."

                  TOKEN_RESPONSE=$(curl -s -X POST "$M2M_APPLICATION_TOKEN_URL" \
                    -H "Content-Type: application/x-www-form-urlencoded" \
                    -d "grant_type=client_credentials" \
                    -d "client_id=$M2M_APPLICATION_CLIENT_ID" \
                    -d "username=$M2M_APPLICATION_USERNAME" \
                    -d "password=$M2M_APPLICATION_PASSWORD" \
                    -d "scope=profile openid email https://klrnbk.nl/projects/appiecal:use")

                  # Extract access token
                  ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.id_token')

                  if [[ "$ACCESS_TOKEN" == "null" || -z "$ACCESS_TOKEN" ]]; then
                    echo "Failed to obtain token:"
                    echo "$TOKEN_RESPONSE"
                    exit 1
                  fi

                  echo "Token received ✔"

                  echo "Calling API..."
                  TRIGGER_RESPONSE=(curl -s -X POST "$API_URL" \
                    -H "X-Authorization: $ACCESS_TOKEN" \
                    -H "Content-Type: application/json")

                  TRIGGER_RESPONSE_ERROR_CODE=$(echo "$TRIGGER_RESPONSE" | jq -r '.status')
                  if [[ "$TRIGGER_RESPONSE_ERROR_CODE" == 403 ]]; then 
                    echo "Failed to trigger automatic sync"
                    echo "$TRIGGER_RESPONSE"
                    exit 1
                  fi
                  
                  echo "Automatic sync triggered"
              env:
                - name: M2M_APPLICATION_TOKEN_URL
                  valueFrom:
                    secretKeyRef:
                      name: appiecal-sync-secrets
                      key: M2M_APPLICATION_TOKEN_URL
                - name: M2M_APPLICATION_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: appiecal-sync-secrets
                      key: M2M_APPLICATION_USERNAME
                - name: M2M_APPLICATION_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: appiecal-sync-secrets
                      key: M2M_APPLICATION_PASSWORD
                - name: M2M_APPLICATION_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: appiecal-sync-secrets
                      key: M2M_APPLICATION_CLIENT_ID
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
          restartPolicy: OnFailure
