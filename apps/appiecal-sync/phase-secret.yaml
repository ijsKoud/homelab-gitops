apiVersion: secrets.phase.dev/v1alpha1
kind: PhaseSecret
metadata:
  name: appiecal-sync-secret-manager
  namespace: default
spec:
  phaseApp: 'appiecal'
  phaseAppEnv: 'production'
  phaseAppEnvPath: '/'
  phaseHost: 'https://phase.rpi-2.home.klrnbk.nl'
  pollingInterval: 60
  authentication:
    serviceToken:
      serviceTokenSecretReference:
        secretName: 'phase-service-token'
        secretNamespace: 'default'
  managedSecretReferences:
    - secretName: 'appiecal-sync-secrets' # Name of the Kubernetes managed secret that Phase will sync
      secretNamespace: 'default'
