apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appiecal-schedule
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: appiecal-schedule.k3s.home.klrnbk.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appiecal-schedule
                port:
                  number: 80
