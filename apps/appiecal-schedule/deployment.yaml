apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-schedule
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-schedule
  template:
    metadata:
      labels:
        app: appiecal-schedule
    spec:
      containers:
        - name: appiecal-schedule
          image: ghcr.io/ijskoud/appiecal-schedule@sha256:b10b2815b94a41ee16f2974f6baf04544bb44d59d9680d65337a0e163388d039
          ports:
            - containerPort: 8080
          env:
            - name: JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-schedule-secrets
                  key: JDBC_URL
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-schedule-secrets
                  key: JWKS_URL
