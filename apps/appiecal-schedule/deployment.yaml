apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-schedule
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-schedule
  template:
    metadata:
      labels:
        app: appiecal-schedule
    spec:
      containers:
        - name: appiecal-schedule
          image: ghcr.io/ijskoud/appiecal-schedule@sha256:581eb18a7e702f308f07f08c455d416ae43f8cf65948e4e293fa6cdb52a1cd64
          ports:
            - containerPort: 8080
          env:
            - name: JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-schedule-secrets
                  key: JDBC_URL
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-schedule-secrets
                  key: JWKS_URL
