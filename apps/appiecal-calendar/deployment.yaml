apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-calendar
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-calendar
  template:
    metadata:
      labels:
        app: appiecal-calendar
    spec:
      containers:
        - name: appiecal-calendar
          image: ghcr.io/ijskoud/appiecal-calendar@sha256:73bb3e359d2fecbf711164971b8e730a6524c7d557377a01a7b4d6856627a8c4
          ports:
            - containerPort: 8080
          env:
            - name: IDP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: appiecal-calendar-secrets
                  key: IDP_ENCRYPTION_KEY
            - name: JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-calendar-secrets
                  key: JDBC_URL
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-calendar-secrets
                  key: JWKS_URL
