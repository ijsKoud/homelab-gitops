apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-web-gql
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-web-gql
  template:
    metadata:
      labels:
        app: appiecal-web-gql
    spec:
      containers:
        - name: appiecal-web-gql
          image: ghcr.io/ijskoud/appiecal-web-gql@sha256:be3d22db85b627675b31567d2731921653020f3cff7b08708d430e8e79e0e5ac
          ports:
            - containerPort: 4000
          env:
            - name: BASE_API_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-web-gql-secrets
                  key: BASE_API_URL
