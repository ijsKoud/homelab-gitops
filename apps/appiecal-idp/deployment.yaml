apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-idp
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-idp
  template:
    metadata:
      labels:
        app: appiecal-idp
    spec:
      containers:
        - name: appiecal-idp
          image: ghcr.io/ijskoud/appiecal-idp@sha256:ef09b924ade15956c74f1e28224c1429e1e929b7bffc8854f0153e9c5cbe482e
          ports:
            - containerPort: 8080
          env:
            - name: IDP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: appiecal-idp-secrets
                  key: IDP_ENCRYPTION_KEY
            - name: JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-idp-secrets
                  key: JDBC_URL
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-idp-secrets
                  key: JWKS_URL
