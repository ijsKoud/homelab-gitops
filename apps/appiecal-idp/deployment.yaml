apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-idp
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-idp
  template:
    metadata:
      labels:
        app: appiecal-idp
    spec:
      containers:
        - name: appiecal-idp
          image: ghcr.io/ijskoud/appiecal-idp@sha256:1d18c6843e87dafee841f977bd5b30393ea2884614fed6d856814ba81fc160a5
          ports:
            - containerPort: 8080
          env:
            - name: IDP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: appiecal
                  key: IDP_ENCRYPTION_KEY
            - name: JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal
                  key: JDB_URL
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal
                  key: JWKS_URL
